<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current_Exif_Bot | Forensic Metadata Extractor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --dark-bg: #030303;
            --glass: rgba(15, 15, 15, 0.9);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Exo 2', sans-serif;
            overflow-x: hidden;
        }

        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 15px; }

        .banner-container {
            width: 100%;
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .banner-container img { width: 100%; display: block; }

        .app-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 40px;
        }

        .app-logo {
            width: clamp(80px, 20vw, 130px);
            height: auto;
            border-radius: 20px;
            border: 2px solid var(--neon-cyan);
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            /* clamp(min, preferred, max) - automatically scales */
            font-size: clamp(1.2rem, 7vw, 2.5rem); 
            color: #fff;
            text-shadow: 0 0 8px var(--neon-cyan);
            margin: 0;
            word-break: break-all; /* Mobile-e boro word bhengay dibe */
            padding: 0 10px;
        }

        .badge-row { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .badge {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 10px;
            color: var(--neon-cyan);
        }

        .device-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .mockup {
            width: 260px;
            border: 6px solid #1a1a1a;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .mockup img { width: 100%; border-radius: 24px; display: block; }

        .dl-btn {
            display: inline-block;
            background: var(--neon-cyan);
            color: #000;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            margin-top: 50px;
            transition: 0.3s;
        }

        footer { padding: 40px 20px; text-align: center; font-size: 12px; color: #555; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <div class="banner-container">
        <img src="Images/Banner.png" alt="Banner">
    </div>

    <div class="app-header">
        <img src="Images/Current_Exif_Bot-v1.0-icon.png" class="app-logo" alt="Icon">
        <h1>CURRENT_EXIF_BOT</h1>
        <div class="badge-row">
            <span class="badge">V1.0</span>
            <span class="badge">SECURE</span>
            <span class="badge">FORENSIC</span>
        </div>
    </div>

    <div class="device-container">
        <div class="mockup"><img src="Images/Screenshot_1-Current_Exif_Bot-v1.0.png"></div>
        <div class="mockup"><img src="Images/Screenshot_2-Current_Exif_Bot-v1.0.jpg"></div>
    </div>

    <div style="text-align:center;">
        <a href="https://github.com/currentvai/Current-Exif-Bot/releases" class="dl-btn">DOWNLOAD APK</a>
    </div>

    <footer>
        <p>© 2026 CURRENT VAI | Developed for Forensic Transparency</p>
    </footer>
</div>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letters = "0101";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(3, 3, 3, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00f2ff";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.985) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 40);
</script>

</body>
</html>
